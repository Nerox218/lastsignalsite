<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Civil Worker's Union — Centre Syndicale</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg-deep:#060809;--bg-panel:#0b0e12;--bg-card:#0f1419;--bg-input:#080b0f;--border:#182030;--border-active:#00b4d8;--accent:#00b4d8;--accent-dim:#006f85;--accent-glow:rgba(0,180,216,0.12);--orange:#f4a21c;--orange-dim:#9a6610;--red:#e53e3e;--green:#38a169;--purple:#9f7aea;--text-primary:#c8d8e8;--text-secondary:#6a8099;--text-dim:#2d4258;--scanline:rgba(0,180,216,0.025);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Rajdhani',sans-serif;background:var(--bg-deep);color:var(--text-primary);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,var(--scanline) 2px,var(--scanline) 4px);pointer-events:none;z-index:9999;}
.grid-bg{position:fixed;inset:0;background-image:linear-gradient(rgba(0,180,216,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(0,180,216,0.03) 1px,transparent 1px);background-size:48px 48px;z-index:0;}
.corner{position:fixed;width:100px;height:100px;z-index:1;pointer-events:none;}
.corner.tl{top:0;left:0;border-top:1px solid var(--accent-dim);border-left:1px solid var(--accent-dim);}
.corner.tr{top:0;right:0;border-top:1px solid var(--accent-dim);border-right:1px solid var(--accent-dim);}
.corner.bl{bottom:0;left:0;border-bottom:1px solid var(--accent-dim);border-left:1px solid var(--accent-dim);}
.corner.br{bottom:0;right:0;border-bottom:1px solid var(--accent-dim);border-right:1px solid var(--accent-dim);}
#app{position:relative;z-index:10;min-height:100vh;}
.view{display:none;min-height:100vh;}
.view.active{display:flex;}
#loading-screen{position:fixed;inset:0;background:var(--bg-deep);z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#loading-screen.fade-out{animation:fadeOut 0.6s ease forwards;}
@keyframes fadeOut{to{opacity:0;pointer-events:none;}}
.loading-logo{width:72px;height:72px;background:var(--orange);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:16px;color:#000;margin-bottom:24px;animation:pulse 1s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.6;}}
.loading-text{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent);letter-spacing:3px;text-transform:uppercase;}
.loading-bar{width:240px;height:2px;background:var(--border);margin-top:16px;overflow:hidden;}
.loading-bar-fill{height:100%;background:var(--accent);animation:loadBar 2.5s ease forwards;}
@keyframes loadBar{from{width:0;}to{width:100%;}}
#view-login{align-items:center;justify-content:center;flex-direction:column;padding:20px;}
.login-wrap{width:100%;max-width:560px;background:var(--bg-panel);border:1px solid var(--border);position:relative;animation:slideUp 0.5s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
.login-wrap::before{content:'';position:absolute;top:-1px;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);}
.login-head{padding:24px 32px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.cwu-hex{width:48px;height:48px;background:var(--orange);clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-weight:900;font-size:13px;color:#000;flex-shrink:0;}
.login-head h1{font-family:'Orbitron',monospace;font-size:17px;font-weight:700;color:#fff;letter-spacing:1px;}
.login-head p{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-secondary);margin-top:2px;}
.login-body{padding:26px 32px 30px;}
.login-title{font-family:'Orbitron',monospace;font-size:20px;font-weight:700;color:#fff;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-secondary);margin-bottom:20px;font-family:'Share Tech Mono',monospace;}
.tab-bar{display:grid;grid-template-columns:1fr 1fr;background:var(--bg-deep);border:1px solid var(--border);margin-bottom:22px;}
.tab-btn{padding:10px;text-align:center;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;color:var(--text-secondary);border:none;background:transparent;transition:all 0.2s;letter-spacing:1px;text-transform:uppercase;}
.tab-btn.active{background:var(--accent);color:#000;font-weight:700;}
.field{margin-bottom:16px;}
.field label{display:block;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:7px;letter-spacing:1px;text-transform:uppercase;}
.field input,.field textarea,.field select{width:100%;background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);padding:11px 13px;font-family:'Share Tech Mono',monospace;font-size:13px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--border-active);box-shadow:0 0 0 1px var(--accent-glow);}
.field input::placeholder,.field textarea::placeholder{color:var(--text-dim);}
.btn-primary{width:100%;padding:14px;background:var(--accent);border:none;color:#000;font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;margin-top:6px;}
.btn-primary:hover{background:#00c8f0;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,180,216,0.3);}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.login-note{text-align:center;margin-top:14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim);}
.sup-btn{position:fixed;bottom:22px;left:22px;background:rgba(11,14,18,0.95);border:1px solid var(--border);color:var(--text-secondary);padding:9px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:all 0.2s;z-index:100;}
.sup-btn:hover{border-color:var(--orange);color:var(--orange);}
.err-msg{background:rgba(229,62,62,0.1);border:1px solid rgba(229,62,62,0.4);color:#fc8181;padding:9px 13px;font-family:'Share Tech Mono',monospace;font-size:11px;margin-bottom:14px;display:none;}
.ok-msg{background:rgba(56,161,105,0.1);border:1px solid rgba(56,161,105,0.4);color:#68d391;padding:9px 13px;font-family:'Share Tech Mono',monospace;font-size:11px;margin-bottom:14px;display:none;}
.tab-panel{display:none;} .tab-panel.active{display:block;}
#view-site{flex-direction:column;}
.topbar{background:var(--bg-panel);border-bottom:1px solid var(--border);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:500;}
.topbar-logo{display:flex;align-items:center;gap:11px;cursor:pointer;}
.topbar-logo .cwu-hex{width:34px;height:34px;font-size:9px;}
.logo-text{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:#fff;}
.logo-text span{display:block;font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-secondary);font-weight:400;margin-top:1px;}
.topbar-nav{display:flex;align-items:center;gap:2px;}
.nav-btn{background:none;border:none;color:var(--text-secondary);font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase;padding:8px 13px;cursor:pointer;transition:color 0.2s;position:relative;}
.nav-btn::after{content:'';position:absolute;bottom:0;left:13px;right:13px;height:1px;background:var(--accent);transform:scaleX(0);transition:transform 0.2s;}
.nav-btn:hover{color:var(--text-primary);} .nav-btn:hover::after,.nav-btn.active::after{transform:scaleX(1);} .nav-btn.active{color:var(--accent);}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-badge{display:flex;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-secondary);}
.status-dot{width:6px;height:6px;border-radius:50%;}
.status-dot.on{background:var(--green);box-shadow:0 0 6px var(--green);}
.role-tag{padding:2px 7px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.role-tag.directeur{background:rgba(244,162,28,0.12);border:1px solid var(--orange);color:var(--orange);}
.role-tag.superviseur{background:rgba(0,180,216,0.08);border:1px solid var(--accent-dim);color:var(--accent);}
.role-tag.membre{background:rgba(56,161,105,0.08);border:1px solid #38a169;color:#68d391;}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:5px 11px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.2s;}
.logout-btn:hover{border-color:var(--red);color:#fc8181;}
.site-layout{display:flex;flex:1;min-height:calc(100vh - 58px);}
.sidebar{width:230px;background:var(--bg-panel);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;overflow-y:auto;}
.sidebar-cat{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim);letter-spacing:2px;text-transform:uppercase;padding:10px 18px 4px;}
.sidebar-link{display:flex;align-items:center;gap:9px;padding:8px 18px;cursor:pointer;transition:all 0.15s;border-left:2px solid transparent;font-size:13px;font-weight:500;color:var(--text-secondary);}
.sidebar-link:hover{background:rgba(0,180,216,0.04);color:var(--text-primary);border-left-color:var(--border);}
.sidebar-link.active{background:rgba(0,180,216,0.07);color:var(--accent);border-left-color:var(--accent);}
.sidebar-icon{font-size:13px;width:16px;text-align:center;opacity:0.65;}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:10px 14px;}
.content-area{flex:1;padding:28px;overflow-y:auto;}
.page-header{margin-bottom:24px;padding-bottom:14px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.page-title{font-family:'Orbitron',monospace;font-size:18px;font-weight:700;color:#fff;}
.page-title .prefix{font-size:10px;color:var(--accent);font-weight:400;display:block;margin-bottom:4px;letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
.card{background:var(--bg-card);border:1px solid var(--border);padding:20px;margin-bottom:14px;position:relative;}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--accent-dim),transparent);opacity:0.35;}
.card-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:600;color:var(--accent);margin-bottom:10px;}
.card-body{font-size:14px;line-height:1.7;color:var(--text-secondary);}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;}
.stat-card{background:var(--bg-card);border:1px solid var(--border);padding:16px;text-align:center;}
.stat-number{font-family:'Orbitron',monospace;font-size:26px;font-weight:700;}
.stat-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-secondary);margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.stat-card.blue .stat-number{color:var(--accent);}
.stat-card.orange .stat-number{color:var(--orange);}
.stat-card.red .stat-number{color:var(--red);}
.stat-card.green .stat-number{color:var(--green);}
.data-table{width:100%;border-collapse:collapse;font-size:12px;}
.data-table th{background:var(--bg-deep);border:1px solid var(--border);padding:9px 13px;text-align:left;font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;text-transform:uppercase;}
.data-table td{border:1px solid var(--border);padding:9px 13px;color:var(--text-secondary);font-family:'Share Tech Mono',monospace;font-size:11px;}
.data-table tr:hover td{background:rgba(0,180,216,0.025);}
.btn-sm{padding:3px 9px;font-family:'Share Tech Mono',monospace;font-size:10px;cursor:pointer;border:1px solid;background:none;transition:all 0.15s;margin-right:3px;}
.btn-sm.approve{border-color:var(--green);color:#68d391;} .btn-sm.approve:hover{background:rgba(56,161,105,0.2);}
.btn-sm.reject{border-color:var(--red);color:#fc8181;} .btn-sm.reject:hover{background:rgba(229,62,62,0.2);}
.btn-sm.edit{border-color:var(--accent-dim);color:var(--accent);} .btn-sm.edit:hover{background:rgba(0,180,216,0.1);}
.btn-sm.del{border-color:var(--red);color:#fc8181;} .btn-sm.del:hover{background:rgba(229,62,62,0.2);}
.btn-sm.promote{border-color:var(--orange);color:var(--orange);} .btn-sm.promote:hover{background:rgba(244,162,28,0.1);}
.alert{padding:11px 15px;border-left:3px solid;margin-bottom:10px;font-family:'Share Tech Mono',monospace;font-size:11px;}
.alert.warning{border-color:var(--orange);background:rgba(244,162,28,0.07);color:var(--orange);}
.alert.info{border-color:var(--accent);background:rgba(0,180,216,0.07);color:var(--accent);}
.alert.danger{border-color:var(--red);background:rgba(229,62,62,0.07);color:#fc8181;}
.alert.success{border-color:var(--green);background:rgba(56,161,105,0.07);color:#68d391;}
.ann-item{background:var(--bg-card);border:1px solid var(--border);border-left:3px solid var(--accent);padding:14px 18px;margin-bottom:10px;}
.ann-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);margin-bottom:5px;}
.ann-title{font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:600;color:var(--text-primary);margin-bottom:7px;}
.ann-body{font-size:13px;color:var(--text-secondary);line-height:1.6;}
.report-filters{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.report-filters select,.report-filters input{background:var(--bg-input);border:1px solid var(--border);color:var(--text-primary);padding:8px 12px;font-family:'Share Tech Mono',monospace;font-size:12px;outline:none;flex:1;min-width:140px;}
.report-row{display:grid;grid-template-columns:110px 90px 1fr 130px 90px 70px;border:1px solid var(--border);margin-bottom:4px;cursor:pointer;}
.report-row:hover{background:rgba(0,180,216,0.04);}
.report-cell{padding:9px 12px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-secondary);border-right:1px solid var(--border);}
.report-cell:last-child{border-right:none;}
.report-cell.header{color:var(--accent);font-size:10px;letter-spacing:1px;background:var(--bg-deep);}
.report-type-badge{display:inline-block;padding:2px 7px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.report-type-badge.unite{background:rgba(0,180,216,0.12);border:1px solid var(--accent-dim);color:var(--accent);}
.report-type-badge.division{background:rgba(159,122,234,0.12);border:1px solid #9f7aea;color:#9f7aea;}
.report-type-badge.alert{background:rgba(229,62,62,0.12);border:1px solid var(--red);color:#fc8181;}
.report-type-badge.prioritaire{background:rgba(244,162,28,0.12);border:1px solid var(--orange);color:var(--orange);}
.report-form-tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:22px;}
.rtab{padding:10px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;color:var(--text-secondary);border-bottom:2px solid transparent;transition:all 0.2s;}
.rtab:hover{color:var(--text-primary);} .rtab.active{color:var(--accent);border-bottom-color:var(--accent);}
.rtab.locked{color:var(--text-dim);cursor:not-allowed;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;} .form-grid-1{grid-column:span 2;}
.form-section{background:var(--bg-card);border:1px solid var(--border);padding:20px;margin-bottom:14px;}
.form-section-title{font-family:'Orbitron',monospace;font-size:11px;color:var(--accent);margin-bottom:16px;letter-spacing:1px;padding-bottom:10px;border-bottom:1px solid var(--border);}
.btn-submit{background:var(--accent);border:none;color:#000;padding:12px 28px;font-family:'Orbitron',monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
.btn-submit:hover{background:#00c8f0;box-shadow:0 0 20px rgba(0,180,216,0.4);}
.btn-submit:disabled{opacity:0.5;cursor:not-allowed;}
.btn-reset{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:12px 20px;font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;transition:all 0.2s;margin-right:10px;}
.btn-reset:hover{border-color:var(--text-secondary);color:var(--text-primary);}
.form-actions{display:flex;align-items:center;justify-content:flex-end;padding-top:16px;border-top:1px solid var(--border);}
.form-id{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);letter-spacing:1px;margin-right:auto;}
.report-detail-field{margin-bottom:14px;}
.report-detail-label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:1px;margin-bottom:5px;}
.report-detail-value{font-size:13px;color:var(--text-primary);line-height:1.6;}
.access-denied{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:300px;text-align:center;}
.access-denied-icon{font-size:48px;margin-bottom:16px;opacity:0.3;}
.access-denied-title{font-family:'Orbitron',monospace;font-size:16px;color:var(--red);margin-bottom:8px;}
.access-denied-sub{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-dim);}
.site-footer{background:var(--bg-panel);border-top:1px solid var(--border);padding:12px 28px;display:flex;align-items:center;justify-content:space-between;}
.footer-text{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);}
#view-admin{flex-direction:column;}
.admin-bar{background:var(--bg-panel);border-bottom:2px solid var(--orange);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:500;}
.admin-bar-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--orange);letter-spacing:2px;display:flex;align-items:center;gap:10px;}
.admin-badge{background:rgba(244,162,28,0.12);border:1px solid var(--orange);padding:2px 8px;font-size:9px;color:var(--orange);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
.admin-layout{display:flex;flex:1;min-height:calc(100vh - 52px);}
.admin-sidebar{width:210px;background:var(--bg-panel);border-right:1px solid var(--border);padding:14px 0;flex-shrink:0;}
.admin-nav{padding:8px 18px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:500;color:var(--text-secondary);display:flex;align-items:center;gap:9px;border-left:2px solid transparent;transition:all 0.15s;}
.admin-nav:hover{color:var(--text-primary);background:rgba(244,162,28,0.04);border-left-color:var(--border);}
.admin-nav.active{color:var(--orange);background:rgba(244,162,28,0.06);border-left-color:var(--orange);}
.admin-content{flex:1;padding:24px;overflow-y:auto;}
.btn-orange{background:var(--orange);border:none;color:#000;padding:9px 18px;font-family:'Orbitron',monospace;font-size:11px;font-weight:700;letter-spacing:1px;cursor:pointer;transition:all 0.2s;}
.btn-orange:hover{background:#f5b73a;}
.btn-ghost{background:none;border:1px solid var(--border);color:var(--text-secondary);padding:9px 18px;font-family:'Share Tech Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;}
.btn-ghost:hover{border-color:var(--text-secondary);color:var(--text-primary);}
.notif-badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;font-family:'Share Tech Mono',monospace;margin-left:5px;}
.page-item{background:var(--bg-card);border:1px solid var(--border);padding:13px 16px;margin-bottom:6px;display:flex;align-items:center;justify-content:space-between;}
.page-item:hover{border-color:var(--accent-dim);}
.page-item-title{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;color:var(--text-primary);}
.page-item-meta{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--text-dim);margin-top:2px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.active{display:flex;}
.modal{background:var(--bg-panel);border:1px solid var(--border);width:100%;max-width:500px;position:relative;animation:slideUp 0.3s ease;}
.modal.wide{max-width:720px;}
.modal::before{content:'';position:absolute;top:-1px;left:12%;right:12%;height:2px;background:linear-gradient(90deg,transparent,var(--orange),transparent);}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:600;color:#fff;}
.modal-close{background:none;border:none;color:var(--text-secondary);font-size:17px;cursor:pointer;transition:color 0.15s;}
.modal-close:hover{color:var(--red);}
.modal-body{padding:20px;}
.modal-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}

/** Toast de confirmation en haut à droite */
function showDiscordToast(type, msg) {
  const t = document.createElement('div');
  t.className = `discord-toast ${type}`;
  t.innerHTML = `<span>${type==='ok'?'🔔':'⚠️'}</span>${msg}`;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function handleDeepLink() {
  const params = new URLSearchParams(window.location.search);
  const target = params.get('admin');
  if (!target) return false;
  if (!CU || !['superviseur','directeur'].includes(CU.role)) return false;
  // Nettoie l'URL sans recharger
  window.history.replaceState({}, '', window.location.pathname);
  showView('view-admin');
  adminSec(target);
  return true;
}

async function approveUser(e){
  const u=_DB.users[emailToKey(e)];
  await update(ref(db,`users/${emailToKey(e)}`),{status:'approved'});
  if(u) await dcNotifyApproved(u.cid, u.email);
  adminSec('pending');
}
async function rejectUser(e){
  const u=_DB.users[emailToKey(e)];
  await update(ref(db,`users/${emailToKey(e)}`),{status:'rejected'});
  if(u) await dcNotifyRejected(u.cid, u.email);
  adminSec('pending');
}
